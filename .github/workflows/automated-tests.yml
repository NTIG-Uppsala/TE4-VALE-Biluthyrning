name: Index Page Automated Content Tests

on:
    schedule:
        - cron: "0 17 * * 1-5"

        
jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v2
              with:
                  python-version: "3.12.5"

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "latest"

            - name: Install dependencies
              run: |
                  pip install pytest-playwright playwright pytest-json-report python-dotenv
                  playwright install
                  npm install

            - name: Create a .env file from environment variables
              run: |
                echo "EXPRESS_SESSION=${{ secrets.EXPRESS_SESSION }}" > .env
                echo "DEBUG_KEY=${{ secrets.DEBUG_KEY }}" >> .env
              shell: bash

            - name: Run server in background and log output
              run: |
                  npm run start > server.log 2>&1 &
              shell: bash

            - name: Wait for server to start
              run: |
                  echo "Waiting for server to start..."
                  while ! grep -q "Server is running on http://localhost:4000" server.log; do
                    sleep 1
                  done
                  echo "Server is up and running."
              shell: bash

            - name: Run tests with pytest-playwright
              run: |
                  pytest tests/test*.py --json-report --json-report-file=test-results.json
              continue-on-error: true

            - name: Stop server
              run: |
                  npm run stop

            - name: Upload test results
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: test-results.json

            - name: Check if any tests ran
              run: |
                  if grep -q '"total": 0,' test-results.json; then
                    echo "No tests were run"
                    exit 1
                  fi

            - name: Check test results
              run: |
                  if grep -q '"failed":' test-results.json; then
                    echo "Tests failed"
                    exit 1
                  else
                    echo "Tests passed"
                  fi
